name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

concurrency: release-apt

permissions:
  contents: write
  pages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            echo "Release $TAG already exists, skipping creation"
          fi

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
            deb_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            deb_arch: armhf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-X main.Version=${{ steps.version.outputs.version }}" -o t2-${{ matrix.deb_arch }} ./cmd/t2

      - name: Build deb package
        run: |
          bash packaging/build-deb.sh \
            t2-${{ matrix.deb_arch }} \
            ${{ steps.version.outputs.version }} \
            ${{ matrix.deb_arch }}

      - name: Lint deb package
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lintian > /dev/null
          lintian --no-tag-display-limit *.deb || true

      - name: Upload deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            t2_${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb

      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.deb_arch }}
          path: "*.deb"

  publish-repo:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: debs
          merge-multiple: true

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo
          fetch-depth: 0

      - name: Copy debs to pool
        run: |
          mkdir -p repo/pool/main
          cp debs/*.deb repo/pool/main/

      - name: Generate package indices
        run: |
          cd repo
          mkdir -p dists/stable/main/binary-arm64
          mkdir -p dists/stable/main/binary-armhf
          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          dpkg-scanpackages --arch armhf pool/ > dists/stable/main/binary-armhf/Packages
          gzip -kf dists/stable/main/binary-arm64/Packages
          gzip -kf dists/stable/main/binary-armhf/Packages

      - name: Generate Release file
        run: |
          cd repo
          {
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: arm64 armhf"
            echo "Components: main"
            apt-ftparchive release dists/stable/
          } > dists/stable/Release

      - name: Import GPG key and sign
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          cd repo
          gpg --batch --yes --local-user "t2 APT Repository" --detach-sign -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --local-user "t2 APT Repository" --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Commit and push
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update apt repo for ${GITHUB_REF#refs/tags/}" || true
          git push

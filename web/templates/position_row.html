<td class="num"></td>
<td><span class="ticker">{{.Ticker}}</span><span class="stock-name">{{.StockName}}</span><span class="raw-ticker">{{.RawTicker}}</span></td>
<td class="value{{if .Profitable}} profitable{{end}}" data-val="{{.MarketValue}}">{{formatGBP .MarketValue}} <button class="refresh-btn" hx-get="/position/{{.RawTicker}}" hx-target="closest tr" hx-swap="innerHTML" title="Refresh">&#x21bb;</button></td>
<td class="exchange">{{.Exchange}}</td>
{{if gt .Invested 0.0}}<td class="value {{returnClass .Return}}" data-val="{{.Return}}">{{formatGBP .Return}}</td>
<td class="value" data-val="{{.Invested}}">{{formatGBP .Invested}} bought</td>
<td class="value {{returnClass .ReturnPct}}" data-val="{{.ReturnPct}}">{{formatPct .ReturnPct}}</td>
<td class="value {{performanceClass .PerformancePct}}" data-val="{{.PerformancePct}}">{{formatPct .PerformancePct}}</td>{{else}}<td class="value">—</td>
<td class="value">—</td>
<td class="value">—</td>
<td class="value">—</td>{{end}}
<td class="value" data-val="{{.Quantity}}">{{formatQty .Quantity}}</td>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2 - Trading212 Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230f172a'/><rect x='20' y='35' width='14' height='30' fill='%23ef5350' rx='1'/><line x1='27' y1='25' x2='27' y2='72' stroke='%23ef5350' stroke-width='3'/><rect x='44' y='22' width='14' height='35' fill='%2322c55e' rx='1'/><line x1='51' y1='14' x2='51' y2='64' stroke='%2322c55e' stroke-width='3'/><rect x='68' y='15' width='14' height='40' fill='%2322c55e' rx='1'/><line x1='75' y1='8' x2='75' y2='62' stroke='%2322c55e' stroke-width='3'/></svg>">
    <script src="/static/htmx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1d23;
            color: #e0e0e0;
            font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #64b5f6;
            font-size: 18px;
            font-weight: bold;
        }
        .header .updated {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }
        .controls {
            text-align: right;
            margin-bottom: 10px;
        }
        .controls button {
            background: #22262e;
            color: #90caf9;
            border: 1px solid #2a2f38;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .controls button:hover { background: #2a2f38; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead tr {
            background: #22262e;
            border-bottom: 2px solid #374151;
        }
        th {
            text-align: left;
            padding: 10px 10px;
            font-size: 11px;
            color: #b0bec5;
            text-transform: uppercase;
            font-weight: 600;
        }
        th.right { text-align: right; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: #bbdefb; }
        th.sortable::after { content: ' \2195'; color: #444; }
        th.sorted.asc::after { content: ' \2191'; color: #90caf9; }
        th.sorted.desc::after { content: ' \2193'; color: #90caf9; }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid #2a2d35;
        }
        td.num { color: #4b5563; }
        td .ticker { color: #60a5fa; font-weight: bold; }
        td .stock-name { color: #ffffff; margin-left: 6px; }
        td .raw-ticker { color: #777; margin-left: 6px; font-size: 11px; }
        td.value {
            text-align: right;
            color: #ffffff;
            font-weight: bold;
        }
        td.exchange { color: #ffffff; }
        tr.total td {
            border-top: 2px solid #374151;
            border-bottom: none;
            padding-top: 10px;
            font-weight: bold;
        }
        tr.total td.value { color: #64b5f6; }
        .error {
            background: #4a1a1a;
            color: #ef9a9a;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #5a2a2a;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px 0;
        }
        .htmx-indicator {
            display: none;
            color: #666;
            font-size: 11px;
        }
        .htmx-request .htmx-indicator { display: inline; }
        .refresh-cell { width: 30px; text-align: center; }
        .refresh-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 3px;
            line-height: 1;
        }
        .refresh-btn:hover { color: #90caf9; background: #2a2a4a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>T2 - Trading212 Dashboard</h1>
    </div>
    <div class="controls">
        <button hx-get="/positions" hx-target="#positions" hx-swap="innerHTML">
            Refresh
        </button>
        <span class="htmx-indicator">Loading...</span>
    </div>
    <div id="positions"
         hx-get="/positions"
         hx-trigger="load, every {{.RefreshSeconds}}s"
         hx-indicator=".htmx-indicator">
    </div>
</body>
</html>

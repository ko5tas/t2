<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2 - Trading212 Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="/static/htmx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1d23;
            color: #e0e0e0;
            font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #64b5f6;
            font-size: 18px;
            font-weight: bold;
        }
        .header .updated {
            color: #666;
            font-size: 11px;
            margin-top: 4px;
        }
        .controls {
            text-align: right;
            margin-bottom: 10px;
        }
        .controls button {
            background: #22262e;
            color: #90caf9;
            border: 1px solid #2a2f38;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .controls button:hover { background: #2a2f38; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead tr {
            background: #22262e;
            border-bottom: 2px solid #374151;
        }
        th {
            text-align: left;
            padding: 10px 10px;
            font-size: 11px;
            color: #b0bec5;
            text-transform: uppercase;
            font-weight: 600;
        }
        th.right { text-align: left; }
        th.sortable { cursor: pointer; user-select: none; }
        th.sortable:hover { color: #bbdefb; }
        th.sortable::after { content: ' \2195'; color: #444; }
        th.sorted.asc::after { content: ' \2191'; color: #90caf9; }
        th.sorted.desc::after { content: ' \2193'; color: #90caf9; }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid #2a2d35;
        }
        tbody { counter-reset: rownum; }
        tbody tr:not(.total) { counter-increment: rownum; }
        td.num { color: #4b5563; }
        td.num::before { content: counter(rownum); }
        td .ticker { color: #60a5fa; font-weight: bold; }
        td .stock-name { color: #ffffff; margin-left: 6px; }
        td .raw-ticker { color: #777; margin-left: 6px; font-size: 11px; }
        td .isin { color: #555; margin-left: 6px; font-size: 10px; }
        td.value {
            text-align: left;
            color: #ffffff;
            font-weight: bold;
        }
        td.exchange { color: #ffffff; }
        tbody tr:not(.total):nth-child(even) { background: #1e2229; }
        tbody tr:not(.total):hover { background: #2a2f3a; }
        tr.total td {
            border-top: 2px solid #374151;
            border-bottom: none;
            padding-top: 10px;
            font-weight: bold;
        }
        tr.total td.value { color: #64b5f6; }
        .error {
            background: #4a1a1a;
            color: #ef9a9a;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #5a2a2a;
        }
        .empty {
            text-align: center;
            color: #666;
            padding: 40px 0;
        }
        .htmx-indicator {
            display: none;
            color: #666;
            font-size: 11px;
        }
        .htmx-request .htmx-indicator { display: inline; }
        .refresh-cell { width: 30px; text-align: center; }
        .refresh-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 3px;
            line-height: 1;
        }
        .refresh-btn:hover { color: #90caf9; background: #2a2a4a; }
        td.negative { color: #ef5350; }
        td.perf-negative { color: #ef5350 !important; }
        td.perf-warning { color: #ff9800 !important; }
        td.perf-good { color: #fdd835 !important; }
        td.perf-positive { color: #4caf50 !important; }
        td.perf-legendary { color: #5bc0be !important; }
        @keyframes profitable-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        td.profitable {
            color: #4ade80 !important;
            animation: profitable-blink 1s ease-in-out infinite;
        }
        .has-tooltip { position: relative; cursor: pointer; }
        .has-tooltip .tooltip {
            display: none;
            position: fixed;
            padding: 8px 12px;
            background: #2a2f38;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: normal;
            text-transform: none;
            white-space: normal;
            max-width: 300px;
            z-index: 1000;
            pointer-events: none;
        }
        .has-tooltip:hover .tooltip { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>T2 - Trading212 Dashboard</h1>
    </div>
    <div class="controls">
        <button hx-get="/positions" hx-target="#positions" hx-swap="innerHTML">
            Refresh
        </button>
        <span class="htmx-indicator">Loading...</span>
    </div>
    <div id="positions"
         hx-get="/positions"
         hx-trigger="load"
         hx-indicator=".htmx-indicator">
    </div>
    <div style="text-align:center;color:#4b5563;font-size:10px;margin-top:20px;">t2 {{.Version}}</div>
    <script>
    (function() {
        document.addEventListener('mouseover', function(e) {
            var th = e.target.closest('.has-tooltip');
            if (!th) return;
            var tip = th.querySelector('.tooltip');
            if (!tip) return;
            // Briefly show offscreen to measure
            tip.style.visibility = 'hidden';
            tip.style.display = 'block';
            var rect = th.getBoundingClientRect();
            var tipH = tip.offsetHeight, tipW = tip.offsetWidth;
            tip.style.display = '';
            tip.style.visibility = '';
            // Position above header; if clipped at top, show below
            var top = rect.top - tipH - 6;
            if (top < 5) top = rect.bottom + 6;
            tip.style.top = top + 'px';
            var left = rect.left + rect.width / 2 - tipW / 2;
            if (left + tipW > window.innerWidth - 10) left = window.innerWidth - tipW - 10;
            if (left < 10) left = 10;
            tip.style.left = left + 'px';
        });
    })();
    (function() {
        var link = document.querySelector('link[rel="icon"]');
        var orig = link.href;
        var green = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#065f46"/><circle cx="16" cy="16" r="8" fill="#4ade80"/></svg>');
        var timer = null;
        var on = false;
        document.body.addEventListener("htmx:afterSettle", function() {
            var has = document.querySelectorAll("td.profitable").length > 0;
            if (has && !timer) {
                timer = setInterval(function() { link.href = (on = !on) ? green : orig; }, 1000);
            } else if (!has && timer) {
                clearInterval(timer); timer = null; on = false; link.href = orig;
            }
        });
    })();
    </script>
</body>
</html>
